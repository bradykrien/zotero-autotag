# ── Zotero credentials ────────────────────────────────────────────────────────
# Copy this file to secrets.yaml and fill in your values.
# secrets.yaml is git-ignored and will never be committed.
#
# To find your Zotero API key: https://www.zotero.org/settings/keys
# To find your library ID: it's the number in your Zotero profile URL,
#   e.g. https://www.zotero.org/users/12345678 → library_id is 12345678

zotero:
  api_key: YOUR_API_KEY_HERE
  library_id: YOUR_LIBRARY_ID_HERE
  library_type: user  # "user" for personal libraries, "group" for shared ones

# ── Local paths ───────────────────────────────────────────────────────────────
paths:
  # Absolute path to your local Zotero storage directory.
  # This is a partial cache — only PDFs you've recently opened are here.
  zotero_storage: /path/to/your/Zotero/storage

  # Mount point for the WebDAV server where your full PDF collection lives.
  # On macOS: Finder → Go → Connect to Server → enter your WebDAV URL.
  # The mounted drive will appear here (usually under /Volumes/).
  # Leave blank if you are not using WebDAV.
  webdav_mount: /Volumes/YOUR_WEBDAV_VOLUME_NAME

# ── WebDAV server (optional) ──────────────────────────────────────────────────
# Only needed if you want the pipeline to access PDFs via WebDAV programmatically
# (e.g. when running on CHTC where you cannot mount drives interactively).
# For normal use on your Mac, mounting via Finder is simpler — see paths above.
webdav:
  url: http://YOUR_RASPBERRY_PI_ADDRESS/path/to/webdav
  username: YOUR_WEBDAV_USERNAME
  password: YOUR_WEBDAV_PASSWORD
