# ── Pipeline settings ─────────────────────────────────────────────────────────
pipeline:
  # Items added more than this many days ago will have tags overwritten.
  # Items added within this window will only have tags added (never removed).
  date_horizon_days: 30

  # Maximum number of tags to assign to a single item.
  max_tags_per_item: 3

  # Minimum cosine similarity score for a tag to be assigned.
  # Lower = more tags assigned (but noisier); higher = fewer, more confident assignments.
  # Tune this by inspecting the dry-run output before applying to Zotero.
  similarity_threshold: 0.38

  # These tags are never added, changed, or removed by any part of the pipeline.
  protected_tags:
    - tbr

# ── Model settings ────────────────────────────────────────────────────────────
model:
  # Ollama must be running locally for vocabulary generation.
  provider: ollama
  name: mistral
  base_url: http://localhost:11434

  # Model used for semantic similarity (tag assignment).
  # This runs locally via sentence-transformers — no internet needed.
  embedding_model: all-mpnet-base-v2

# ── PDF extraction settings ───────────────────────────────────────────────────
pdf:
  # Number of pages to extract per PDF. 20 pages captures the intro and early
  # chapters where topical signal is strongest, without processing entire books.
  max_pages: 20
